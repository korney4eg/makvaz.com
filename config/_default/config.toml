enableRobotsTXT = true
rssLimit = 10
[privacy]
  [privacy.disqus]
    disable = false
  [privacy.googleAnalytics]
    anonymizeIP = true
    disable = false
    respectDoNotTrack = true
    useSessionStorage = true

[outputFormats]
[outputFormats.RSS]
mediatype = "application/rss"
baseName = "feed"

[frontmatter]
date  = [":filename", ":default"]

[permalinks]
    post = "/:year/:month/:day/:slug"
    page = "/page:slug"

[taxonomies]
    tag = "tags"
    archive = "archives"

[author]
    name = "Aliaksei Karneyeu"

[related]
  includeNewer = true
  threshold = 10
  toLower = true
  [[related.indices]]
    name = "tags"
    weight = 100

[markup.highlight]
  codeFences = true
  style = "monokai"

[markup.goldmark.renderer]
unsafe= true

privacy_pack = true

[params]
  featureImg = "assets/img/header-pic.jpeg"
  customHeadHTML = "<link rel='preconnect' href='https://fonts.googleapis.com'><link rel='preconnect' href='https://fonts.gstatic.com' crossorigin><link href='https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap' rel='stylesheet'><style>.footer { opacity: 0.60; font-size: 0.75em; } .footer-identity { margin-bottom: 8px; } .footer-tagline { opacity: 0.75; } .footer-social { display: flex; gap: 12px; margin-bottom: 8px; justify-content: center; } .footer-social a { display: flex; align-items: center; } .footer-social img { width: 18px; height: 18px; } .footer-social svg { width: 18px; height: 18px; fill: currentColor; } .footer-menu a { display: block; } .footer-menu span { display: block; margin-top: 4px; } .list-posts .post-title { margin-bottom: 24px !important; overflow: hidden; } .list-posts .post-title a { font-size: 1.15em; width: auto; } .list-posts .post-date { font-size: 0.8em; color: gray; } .post-summary { margin-top: 6px; font-size: 0.95em; opacity: 0.85; line-height: 1.7; letter-spacing: 0.5px; font-style: italic; } .post-content { font-weight: 300; } .related-posts { margin-top: 48px; padding-top: 24px; border-top: 1px solid var(--light-secondary-color); } .related-posts h3 { margin-bottom: 16px; } .pagination { display: flex; width: 100%; } .pagination-newer { margin-left: auto; }</style>"
